# 简历分析系统配置文件
# 使用方式：在主配置文件中添加 spring.profiles.include: resume-analysis

# AI服务配置
ai:
  service:
    # 星火知识库配置
    spark-app-id: "ae56356f"  # 请替换为您的实际AppID
    spark-api-secret: "YzUxNjY0MWE5MDViNDk2ZTIzZTlmNTky"  # 请替换为您的实际API密钥
    spark-upload-url: "https://chatdoc.xfyun.cn/openapi/v1/file/upload"
    spark-status-url: "https://chatdoc.xfyun.cn/openapi/v1/file/status"
    spark-chunks-url: "https://chatdoc.xfyun.cn/openapi/v1/file/chunks"
    
    # 通义千问配置
    qwen-api-key: "sk-0fb1011a6f404ea28251cc1480efc539"  # 请替换为您的实际API密钥
    qwen-base-url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    qwen-model: "qwen-plus"
    
    # 文件上传配置
    upload-dir: "D:/jingsai/ai-interview-master/uploads"  # 请根据实际情况修改路径

# 文件上传配置
spring:
  servlet:
    multipart:
      max-file-size: 50MB      # 单个文件最大大小
      max-request-size: 100MB  # 请求最大大小
      enabled: true

# 日志配置
logging:
  level:
    com.aiinterview.service.impl.ResumeAnalysisServiceImpl: DEBUG
    com.aiinterview.controller.ResumeAnalysisController: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# MyBatis配置
mybatis-plus:
  mapper-locations: classpath*:mapper/*Mapper.xml
  type-aliases-package: com.aiinterview.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 数据库连接池配置（如果使用Druid）

  datasource:
    druid:
      # 初始连接数
      initial-size: 5
      # 最小连接池数量
      min-idle: 10
      # 最大连接池数量
      max-active: 20
      # 配置获取连接等待超时的时间
      max-wait: 60000
      # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
      time-between-eviction-runs-millis: 60000
      # 配置一个连接在池中最小生存的时间，单位是毫秒
      min-evictable-idle-time-millis: 300000
      # 配置一个连接在池中最大生存的时间，单位是毫秒
      max-evictable-idle-time-millis: 900000
      # 配置检测连接是否有效
      validation-query: SELECT 1 FROM DUAL
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      # 打开PSCache，并且指定每个连接上PSCache的大小
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      # 配置监控统计拦截的filters，去掉后监控界面sql无法统计，'wall'用于防火墙
      filters: stat,wall,slf4j
      # 通过connectProperties属性来打开mergeSql功能；慢SQL记录
      connection-properties: druid.stat.mergeSql\=true;druid.stat.slowSqlMillis\=5000

# 跨域配置
cors:
  allowed-origins:
    - "http://localhost:8089"
    - "http://localhost:3000"
    - "http://127.0.0.1:8089"
    - "http://127.0.0.1:3000"
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allowed-headers: "*"
  allow-credentials: true

# 缓存配置（如果使用Redis）

  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
    timeout: 10000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

# 线程池配置
thread-pool:
  core-pool-size: 5
  max-pool-size: 10
  queue-capacity: 100
  keep-alive-seconds: 60
  thread-name-prefix: "resume-analysis-"

# 业务配置
business:
  resume-analysis:
    # 分析超时时间（秒）
    analysis-timeout: 300
    # 最大重试次数
    max-retry-times: 3
    # 支持的文件格式
    supported-formats:
      - pdf
      - doc
      - docx
    # 最大文件大小（MB）
    max-file-size: 50
    # 分析结果缓存时间（小时）
    cache-duration: 24

# MyBatis Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Dify API 配置
dify:
  exam:
    api:
      base-url: "https://api.dify.ai/v1"
      auth-token: "app-NgAYdZAp7nQYBJ8tXefhtnn0"
  interview:
    api:
      base-url: "https://api.dify.ai/v1"
      auth-token: "app-your-interview-token"

# 答案缓存配置
answer:
  cache:
    expiration-minutes: 120
    cache-enabled: true
    lazy-loading-enabled: true
    multiple-result-sets-enabled: true
    use-column-label: true
    use-generated-keys: true
    auto-mapping-behavior: partial
    default-executor-type: simple
    default-statement-timeout: 25000
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      insert-strategy: not_null
      update-strategy: not_null
      select-strategy: not_empty
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.aiinterview.entity

# JWT配置
jwt:
  secret: aiInterviewSecretKey2024ForJWTTokenGenerationWithMoreCharactersToMeet512BitsRequirement
  expiration: 86400000 # 24小时
  refresh-expiration: 604800000 # 7天

# 文件上传配置
file:
  upload:
    # 自定义文件保存路径 - 可以修改为你想要的任何本地路径
    path: D:\MyFiles\ResumeUploads
    # 备选路径配置示例：
    # path: C:/Users/YourName/Documents/Resumes/
    # path: E:/ProjectFiles/AIInterview/uploads/
    # path: ./uploads/  # 相对路径（项目根目录下）

    # 文件访问URL前缀
    url-prefix: http://localhost:8080/uploads

    # 文件大小限制
    max-size: 50MB

    # 允许的文件类型
    allowed-types: jpg,jpeg,png,gif,pdf,doc,docx,xls,xlsx


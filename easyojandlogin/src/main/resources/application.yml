# 视频分析配置
video:
  analysis:
    # Python服务配置
    python:
      service:
        url: http://localhost:5000
        timeout: 300000  # 5分钟超时
        retry-count: 3
        retry-delay: 5000  # 重试间隔5秒

    # 视频上传配置
    upload:
      path: E:\Projects\hautproject\2026\li\easyojandlogin\src\main\resources\videos
      url-prefix: http://localhost:8080/api/videos
      max-size: 100MB
      allowed-formats: mp4,avi,mov,mkv

    # 分析配置
    settings:
      # 音频分析配置
      audio:
        segment-duration: 30  # 音频分段时长（秒）
        analysis-ratio: 0.33  # 分析片段比例（分析1/3的片段）

      # 视频分析配置
      video:
        frame-interval: 30    # 帧提取间隔（秒）
        max-frames: 20        # 最大分析帧数

      # 评分配置
      scoring:
        face-weight: 0.5      # 面部表情权重
        audio-weight: 0.5     # 音频情感权重
        expression-weight: 0.4  # 表情权重
        state-weight: 0.4       # 状态权重
        background-weight: 0.2  # 背景权重

# Swagger配置 (SpringBoot 2.7.2 使用 springfox)
# 注意：SpringBoot 2.7.2 建议使用 springfox-swagger 而不是 springdoc
# 如需使用swagger，请添加相应依赖

# 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# 日志配置
logging:
  level:
    root: info
    com.aiinterview: debug
    org.springframework.security: debug
    org.springframework.web: debug
    com.baomidou.mybatisplus: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/ai-interview.log
    max-size: 10MB
    max-history: 30

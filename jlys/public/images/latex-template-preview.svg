<svg width="300" height="400" viewBox="0 0 300 400" fill="none" xmlns="http://www.w3.org/2000/svg">
<!-- 背景 -->
<rect width="300" height="400" fill="#FEFEFE"/>
<!-- 简历容器 -->
<rect x="20" y="20" width="260" height="360" fill="white" stroke="#D1D5DB"/>

<!-- 标题区域 -->
<rect x="40" y="40" width="220" height="30" fill="#1F2937"/>
<text x="150" y="58" fill="white" font-family="serif" font-size="16" font-weight="bold" text-anchor="middle">李明</text>

<!-- 分隔线 -->
<line x1="40" y1="85" x2="260" y2="85" stroke="#374151" stroke-width="2"/>

<!-- 联系信息 -->
<rect x="40" y="100" width="80" height="8" fill="#4B5563"/>
<rect x="130" y="100" width="90" height="8" fill="#4B5563"/>
<rect x="40" y="115" width="100" height="8" fill="#4B5563"/>

<!-- 教育背景 -->
<rect x="40" y="145" width="220" height="14" fill="#1F2937"/>
<text x="45" y="155" fill="white" font-family="serif" font-size="11" font-weight="bold">教育背景</text>

<rect x="40" y="170" width="150" height="8" fill="#6B7280"/>
<rect x="200" y="170" width="60" height="8" fill="#9CA3AF"/>
<rect x="40" y="185" width="180" height="6" fill="#9CA3AF"/>

<!-- 工作经历 -->
<rect x="40" y="210" width="220" height="14" fill="#1F2937"/>
<text x="45" y="220" fill="white" font-family="serif" font-size="11" font-weight="bold">工作经历</text>

<rect x="40" y="235" width="140" height="8" fill="#6B7280"/>
<rect x="190" y="235" width="70" height="8" fill="#9CA3AF"/>
<rect x="40" y="250" width="200" height="6" fill="#9CA3AF"/>
<rect x="40" y="260" width="180" height="6" fill="#9CA3AF"/>
<rect x="40" y="270" width="160" height="6" fill="#9CA3AF"/>

<!-- 技能与证书 -->
<rect x="40" y="295" width="220" height="14" fill="#1F2937"/>
<text x="45" y="305" fill="white" font-family="serif" font-size="11" font-weight="bold">技能与证书</text>

<rect x="40" y="320" width="120" height="6" fill="#6B7280"/>
<rect x="40" y="330" width="140" height="6" fill="#6B7280"/>
<rect x="40" y="340" width="100" height="6" fill="#6B7280"/>

<!-- 学术风格装饰 -->
<rect x="35" y="40" width="2" height="320" fill="#1F2937"/>
<circle cx="36" cy="50" r="1" fill="#1F2937"/>
<circle cx="36" cy="155" r="1" fill="#1F2937"/>
<circle cx="36" cy="220" r="1" fill="#1F2937"/>
<circle cx="36" cy="305" r="1" fill="#1F2937"/>
</svg>
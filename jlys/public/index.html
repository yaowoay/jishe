<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="icon" href="<%= BASE_URL %>favicon.ico">
    <title>高校学生就业能力智配平台</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- ✅ 在最前面拦截错误 -->
    <script>
        (function() {
            // 拦截所有错误
            window.addEventListener('error', function(e) {
                if (e.message && e.message.includes('getBoundingClientRect')) {
                    e.stopPropagation();
                    e.preventDefault();
                    console.warn('已拦截 getBoundingClientRect 错误');
                    return false;
                }
            }, true);

            // 拦截 Promise 错误
            window.addEventListener('unhandledrejection', function(e) {
                if (e.reason && e.reason.message && e.reason.message.includes('getBoundingClientRect')) {
                    e.preventDefault();
                    console.warn('拦截 Promise: getBoundingClientRect 错误');
                    return false;
                }
            });

            // 覆盖 getBoundingClientRect 方法
            if (typeof Element !== 'undefined') {
                const originalGetBoundingClientRect = Element.prototype.getBoundingClientRect;
                Element.prototype.getBoundingClientRect = function() {
                    try {
                        return originalGetBoundingClientRect.call(this);
                    } catch(e) {
                        return { top: 0, left: 0, right: 0, bottom: 0, width: 0, height: 0 };
                    }
                };
            }
        })();
    </script>

    <script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.15/libs/cn/index.js"></script>
    <script src="<%= BASE_URL %>rtcplayer.iife.js"></script>

</head>
<body>
<noscript>
    <strong>We're sorry but this app doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
</noscript>
<div id="app"></div>
<!-- built files will be auto injected -->
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

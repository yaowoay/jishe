<script>
    window.addEventListener('message', function(event) {
        if (event.data.type === 'RESUME_DATA') {
            const data = event.data.data;
            console.log('收到简历数据:', data);

            // 根据你的 HTML 结构，用 JavaScript 填充数据
            // 示例：如果有 id 为 "name" 的元素
            if (document.getElementById('name')) {
                document.getElementById('name').textContent = data.fullName || '';
            }
            // 或者替换占位符
            document.body.innerHTML = document.body.innerHTML
                .replace(/{{name}}/g, data.fullName || '')
                .replace(/{{position}}/g, data.position || '')
                .replace(/{{phone}}/g, data.phone || '')
                .replace(/{{email}}/g, data.email || '');
        }
    });
</script>

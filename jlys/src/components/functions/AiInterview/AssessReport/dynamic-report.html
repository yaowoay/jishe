<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="reportTitle">面试评估报告</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#10B981',
                        accent: '#F59E0B',
                        neutral: '#6B7280',
                        light: '#F3F4F6',
                        dark: '#1F2937'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .score-circle {
                transform: rotate(-90deg);
            }
            .card-hover {
                transition: all 0.3s ease;
            }
            .card-hover:hover {
                transform: translateY(-5px);
                box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            }
            .fade-in {
                animation: fadeIn 0.6s ease-out forwards;
                opacity: 0;
            }
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-dark">
<!-- 导航栏 -->
<nav class="sticky top-0 bg-white shadow-md z-50">
    <div class="container mx-auto px-4">
        <div class="flex justify-between items-center py-4">
            <div class="flex items-center">
                <i class="fa fa-file-text-o text-primary text-2xl mr-2"></i>
                <span class="font-bold text-lg">面试评估报告</span>
            </div>
            <div class="hidden md:flex space-x-6">
                <a href="#overview" class="text-sm hover:text-primary transition-colors">总体评估</a>
                <a href="#abilities" class="text-sm hover:text-primary transition-colors">能力分析</a>
                <a href="#details" class="text-sm hover:text-primary transition-colors">评分详情</a>
                <a href="#learning" class="text-sm hover:text-primary transition-colors">学习建议</a>
            </div>
            <button class="md:hidden text-neutral">
                <i class="fa fa-bars"></i>
            </button>
        </div>
    </div>
</nav>

<!-- 头部信息 -->
<header class="bg-gradient-to-r from-primary to-blue-700 text-white py-12">
    <div class="container mx-auto px-4">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center">
            <div class="fade-in" style="animation-delay: 100ms;">
                <h1 id="positionTitle" class="text-[clamp(1.8rem,4vw,3rem)] font-bold mb-2">AI面试评估</h1>
                <p class="opacity-90">面试综合评估报告</p>
            </div>
            <div class="mt-6 md:mt-0 bg-white/10 backdrop-blur-sm px-5 py-3 rounded-lg fade-in" style="animation-delay: 300ms;">
                <div class="flex items-center mb-2">
                    <i class="fa fa-calendar mr-2"></i>
                    <span id="assessmentDate">评估日期：</span>
                </div>
                <div class="flex items-center">
                    <i class="fa fa-clock-o mr-2"></i>
                    <span id="interviewDuration">面试时长：</span>
                </div>
            </div>
        </div>
    </div>
</header>

<main class="container mx-auto px-4 py-10">
    <!-- 总体评估卡片 -->
    <section id="overview" class="mb-12 fade-in" style="animation-delay: 400ms;">
        <div class="bg-white rounded-xl shadow-lg p-6 md:p-8">
            <h2 class="text-2xl font-bold mb-6 flex items-center">
                <i class="fa fa-star text-accent mr-3"></i>总体评估
            </h2>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-10">
                <!-- 面试得分 -->
                <div class="bg-light rounded-lg p-6 text-center card-hover">
                    <div class="relative w-36 h-36 mx-auto mb-4">
                        <svg class="w-full h-full score-circle">
                            <circle cx="72" cy="72" r="63" fill="none" stroke="#E5E7EB" stroke-width="12"/>
                            <circle id="interviewScoreCircle" cx="72" cy="72" r="63" fill="none" stroke="#3B82F6" stroke-width="12"
                                    stroke-dasharray="395.84" stroke-dashoffset="79.17" class="transition-all duration-1500 ease-out"/>
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center flex-col">
                            <span id="interviewScore" class="text-4xl font-bold text-primary">80</span>
                            <span class="text-sm text-neutral">面试得分</span>
                        </div>
                    </div>
                    <div class="mt-2">
                        <div class="w-full bg-gray-200 rounded-full h-2.5 mb-1">
                            <div id="interviewScoreBar" class="bg-primary h-2.5 rounded-full" style="width: 80%"></div>
                        </div>
                        <p class="text-sm text-neutral">权重占比: 70%</p>
                    </div>
                </div>

                <!-- 表现评估 -->
                <div class="bg-light rounded-lg p-6 text-center card-hover">
                    <div class="relative w-36 h-36 mx-auto mb-4">
                        <svg class="w-full h-full score-circle">
                            <circle cx="72" cy="72" r="63" fill="none" stroke="#E5E7EB" stroke-width="12"/>
                            <circle id="performanceScoreCircle" cx="72" cy="72" r="63" fill="none" stroke="#10B981" stroke-width="12"
                                    stroke-dasharray="395.84" stroke-dashoffset="118.75" class="transition-all duration-1500 ease-out delay-300"/>
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center flex-col">
                            <span id="performanceScore" class="text-4xl font-bold text-secondary">75</span>
                            <span class="text-sm text-neutral">表现评估</span>
                        </div>
                    </div>
                    <div class="mt-2">
                        <div class="w-full bg-gray-200 rounded-full h-2.5 mb-1">
                            <div id="performanceScoreBar" class="bg-secondary h-2.5 rounded-full" style="width: 75%"></div>
                        </div>
                        <p class="text-sm text-neutral">权重占比: 30%</p>
                    </div>
                </div>

                <!-- 综合得分 -->
                <div class="bg-light rounded-lg p-6 text-center card-hover">
                    <div class="relative w-36 h-36 mx-auto mb-4">
                        <svg class="w-full h-full score-circle">
                            <circle cx="72" cy="72" r="63" fill="none" stroke="#E5E7EB" stroke-width="12"/>
                            <circle id="overallScoreCircle" cx="72" cy="72" r="63" fill="none" stroke="#F59E0B" stroke-width="12"
                                    stroke-dasharray="395.84" stroke-dashoffset="91.04" class="transition-all duration-1500 ease-out delay-500"/>
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center flex-col">
                            <span id="overallScore" class="text-4xl font-bold text-accent">78</span>
                            <span class="text-sm text-neutral">综合得分</span>
                        </div>
                    </div>
                    <div class="mt-4">
                        <p id="overallResult" class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-green-100 text-green-800">
                            <i class="fa fa-check-circle mr-1"></i> 合格
                        </p>
                    </div>
                </div>
            </div>

            <div class="mt-8 p-4 bg-blue-50 rounded-lg border border-blue-100">
                <h3 class="font-semibold text-blue-800 mb-2 flex items-center">
                    <i class="fa fa-comment-o mr-2"></i>综合评价
                </h3>
                <p id="overallComment" class="text-blue-700 text-sm">
                    正在生成评价...
                </p>
            </div>
        </div>
    </section>

    <!-- 面试详情 -->
    <section id="details" class="mb-12 fade-in" style="animation-delay: 600ms;">
        <div class="bg-white rounded-xl shadow-lg p-6 md:p-8">
            <h2 class="text-2xl font-bold mb-6 flex items-center">
                <i class="fa fa-list-alt text-accent mr-3"></i>面试详情
            </h2>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-light p-5 rounded-lg">
                    <h4 class="font-medium mb-4 flex items-center">
                        <i class="fa fa-comments mr-2 text-primary"></i>问答统计
                    </h4>
                    <div id="questionStats" class="space-y-3">
                        <!-- 动态生成问答统计 -->
                    </div>
                </div>

                <div class="bg-light p-5 rounded-lg">
                    <h4 class="font-medium mb-4 flex items-center">
                        <i class="fa fa-user mr-2 text-secondary"></i>表现分析
                    </h4>
                    <div id="performanceAnalysis" class="space-y-3">
                        <!-- 动态生成表现分析 -->
                    </div>
                </div>
            </div>

            <div class="mt-6">
                <h3 class="text-xl font-semibold mb-4 text-primary flex items-center">
                    <i class="fa fa-comments-o mr-2"></i>问答记录
                </h3>
                <div id="questionAnswerList" class="space-y-4">
                    <!-- 动态生成问答记录 -->
                </div>
            </div>
        </div>
    </section>

    <!-- 学习建议 -->
    <section id="learning" class="mb-12 fade-in" style="animation-delay: 800ms;">
        <div class="bg-white rounded-xl shadow-lg p-6 md:p-8">
            <h2 class="text-2xl font-bold mb-6 flex items-center">
                <i class="fa fa-lightbulb-o text-accent mr-3"></i>学习建议
            </h2>

            <div id="learningAdvice" class="space-y-6">
                <!-- 动态生成学习建议 -->
            </div>
        </div>
    </section>
</main>

<footer class="bg-dark text-white py-10">
    <div class="container mx-auto px-4">
        <div class="text-center">
            <p class="text-gray-400 text-sm">
                本报告基于AI面试系统自动生成，客观反映面试表现，仅供参考。
            </p>
            <p class="text-gray-500 text-xs mt-2">
                © 2024 AI面试系统. 保留所有权利.
            </p>
        </div>
    </div>
</footer>

<script>
    // 页面加载完成后初始化报告
    document.addEventListener('DOMContentLoaded', function() {
        loadInterviewData();
        generateReport();
    });

    let interviewData = {};

    function loadInterviewData() {
        // 从 localStorage 获取面试数据
        const storedData = localStorage.getItem('interviewData');
        if (storedData) {
            interviewData = JSON.parse(storedData);
        } else {
            // 如果没有数据，使用默认数据
            interviewData = getDefaultInterviewData();
        }
    }

    function getDefaultInterviewData() {
        return {
            timestamp: new Date().toISOString(),
            duration: '15:30',
            questions: [
                { question: '请介绍一下您的技术背景', answer: '我有3年的前端开发经验...' },
                { question: '您对Vue.js有什么了解？', answer: 'Vue.js是一个渐进式框架...' }
            ],
            currentQuestionIndex: 2,
            faceDetectionResults: { face_num: 1 },
            recognizedTexts: '用户回答的语音识别文本...'
        };
    }

    function generateReport() {
        updateBasicInfo();
        updateScores();
        updateQuestionStats();
        updatePerformanceAnalysis();
        updateQuestionAnswerList();
        updateLearningAdvice();
    }

    function updateBasicInfo() {
        const date = new Date(interviewData.timestamp);
        document.getElementById('assessmentDate').textContent = 
            `评估日期：${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
        document.getElementById('interviewDuration').textContent = 
            `面试时长：${interviewData.duration || '未知'}`;
    }

    function updateScores() {
        // 根据面试数据计算分数
        const questionCount = interviewData.questions?.length || 0;
        const completedQuestions = interviewData.currentQuestionIndex || 0;
        
        // 计算面试得分（基于问题完成度和其他因素）
        const interviewScore = Math.min(90, Math.max(60, 70 + (completedQuestions / questionCount) * 20));
        const performanceScore = Math.min(85, Math.max(65, 75 + (interviewData.faceDetectionResults?.face_num === 1 ? 10 : -5)));
        const overallScore = Math.round(interviewScore * 0.7 + performanceScore * 0.3);

        // 更新分数显示
        document.getElementById('interviewScore').textContent = Math.round(interviewScore);
        document.getElementById('performanceScore').textContent = Math.round(performanceScore);
        document.getElementById('overallScore').textContent = overallScore;

        // 更新进度条
        document.getElementById('interviewScoreBar').style.width = `${interviewScore}%`;
        document.getElementById('performanceScoreBar').style.width = `${performanceScore}%`;

        // 更新圆形进度
        updateCircleProgress('interviewScoreCircle', interviewScore);
        updateCircleProgress('performanceScoreCircle', performanceScore);
        updateCircleProgress('overallScoreCircle', overallScore);

        // 更新结果状态
        const resultElement = document.getElementById('overallResult');
        if (overallScore >= 75) {
            resultElement.innerHTML = '<i class="fa fa-check-circle mr-1"></i> 优秀';
            resultElement.className = 'inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-green-100 text-green-800';
        } else if (overallScore >= 60) {
            resultElement.innerHTML = '<i class="fa fa-check-circle mr-1"></i> 合格';
            resultElement.className = 'inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-blue-100 text-blue-800';
        } else {
            resultElement.innerHTML = '<i class="fa fa-times-circle mr-1"></i> 待提升';
            resultElement.className = 'inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-red-100 text-red-800';
        }

        // 更新综合评价
        updateOverallComment(overallScore, questionCount, completedQuestions);
    }

    function updateCircleProgress(elementId, percentage) {
        const circle = document.getElementById(elementId);
        const circumference = 2 * Math.PI * 63; // r=63
        const offset = circumference - (percentage / 100) * circumference;
        circle.style.strokeDashoffset = offset;
    }

    function updateOverallComment(score, totalQuestions, completedQuestions) {
        let comment = '';
        if (score >= 80) {
            comment = `面试表现优秀！完成了${completedQuestions}/${totalQuestions}个问题，回答质量较高，表现自然流畅。建议继续保持，可以进一步提升技术深度。`;
        } else if (score >= 70) {
            comment = `面试表现良好，完成了${completedQuestions}/${totalQuestions}个问题，基本达到要求。建议在回答的完整性和技术细节方面进一步加强。`;
        } else if (score >= 60) {
            comment = `面试表现合格，完成了${completedQuestions}/${totalQuestions}个问题，但还有提升空间。建议加强技术基础学习和面试技巧练习。`;
        } else {
            comment = `面试表现需要提升，建议多进行模拟练习，加强技术基础学习，提高回答的准确性和完整性。`;
        }
        document.getElementById('overallComment').textContent = comment;
    }

    function updateQuestionStats() {
        const questionCount = interviewData.questions?.length || 0;
        const completedQuestions = interviewData.currentQuestionIndex || 0;
        
        const statsHtml = `
            <div class="flex justify-between">
                <span class="text-sm">总问题数</span>
                <span class="text-sm font-medium">${questionCount}题</span>
            </div>
            <div class="flex justify-between">
                <span class="text-sm">已完成</span>
                <span class="text-sm font-medium text-green-600">${completedQuestions}题</span>
            </div>
            <div class="flex justify-between">
                <span class="text-sm">完成率</span>
                <span class="text-sm font-medium">${questionCount > 0 ? Math.round((completedQuestions / questionCount) * 100) : 0}%</span>
            </div>
        `;
        document.getElementById('questionStats').innerHTML = statsHtml;
    }

    function updatePerformanceAnalysis() {
        const faceDetected = interviewData.faceDetectionResults?.face_num === 1;
        const hasAudio = interviewData.recognizedTexts && interviewData.recognizedTexts.length > 0;
        
        const analysisHtml = `
            <div class="flex justify-between">
                <span class="text-sm">人脸检测</span>
                <span class="text-sm font-medium ${faceDetected ? 'text-green-600' : 'text-red-600'}">
                    ${faceDetected ? '正常' : '异常'}
                </span>
            </div>
            <div class="flex justify-between">
                <span class="text-sm">语音识别</span>
                <span class="text-sm font-medium ${hasAudio ? 'text-green-600' : 'text-orange-600'}">
                    ${hasAudio ? '正常' : '待优化'}
                </span>
            </div>
            <div class="flex justify-between">
                <span class="text-sm">整体表现</span>
                <span class="text-sm font-medium text-blue-600">良好</span>
            </div>
        `;
        document.getElementById('performanceAnalysis').innerHTML = analysisHtml;
    }

    function updateQuestionAnswerList() {
        const questions = interviewData.questions || [];
        let listHtml = '';
        
        questions.forEach((qa, index) => {
            listHtml += `
                <div class="bg-light p-4 rounded-lg">
                    <h4 class="font-medium text-primary mb-2">问题 ${index + 1}</h4>
                    <p class="text-sm text-gray-700 mb-3">${qa.question || '问题内容'}</p>
                    <h5 class="font-medium text-secondary mb-1">回答</h5>
                    <p class="text-sm text-gray-600">${qa.answer || '回答内容'}</p>
                </div>
            `;
        });
        
        if (listHtml === '') {
            listHtml = '<p class="text-gray-500 text-center">暂无问答记录</p>';
        }
        
        document.getElementById('questionAnswerList').innerHTML = listHtml;
    }

    function updateLearningAdvice() {
        const completedQuestions = interviewData.currentQuestionIndex || 0;
        const totalQuestions = interviewData.questions?.length || 0;
        const completionRate = totalQuestions > 0 ? (completedQuestions / totalQuestions) : 0;
        
        let adviceHtml = '';
        
        if (completionRate < 0.5) {
            adviceHtml = `
                <div class="bg-orange-50 p-4 rounded-lg border border-orange-200">
                    <h3 class="font-semibold text-orange-800 mb-2">重点提升建议</h3>
                    <ul class="space-y-2 text-sm text-orange-700">
                        <li class="flex items-start">
                            <i class="fa fa-arrow-right mt-1 mr-2"></i>
                            <span>加强面试准备，提前练习常见技术问题</span>
                        </li>
                        <li class="flex items-start">
                            <i class="fa fa-arrow-right mt-1 mr-2"></i>
                            <span>提高回答的完整性和逻辑性</span>
                        </li>
                        <li class="flex items-start">
                            <i class="fa fa-arrow-right mt-1 mr-2"></i>
                            <span>多进行模拟面试练习</span>
                        </li>
                    </ul>
                </div>
            `;
        } else {
            adviceHtml = `
                <div class="bg-green-50 p-4 rounded-lg border border-green-200">
                    <h3 class="font-semibold text-green-800 mb-2">继续保持</h3>
                    <ul class="space-y-2 text-sm text-green-700">
                        <li class="flex items-start">
                            <i class="fa fa-check mt-1 mr-2"></i>
                            <span>面试表现良好，继续保持自信</span>
                        </li>
                        <li class="flex items-start">
                            <i class="fa fa-check mt-1 mr-2"></i>
                            <span>可以进一步深入技术细节的讨论</span>
                        </li>
                        <li class="flex items-start">
                            <i class="fa fa-check mt-1 mr-2"></i>
                            <span>保持良好的沟通表达能力</span>
                        </li>
                    </ul>
                </div>
            `;
        }
        
        document.getElementById('learningAdvice').innerHTML = adviceHtml;
    }

    // 平滑滚动
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', function (e) {
            e.preventDefault();
            document.querySelector(this.getAttribute('href')).scrollIntoView({
                behavior: 'smooth'
            });
        });
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
   <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.0.0/crypto-js.min.js"></script>
     <script id="MathJax-script" async src="marked.min.js"></script>
    <title>AI Chat</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f4f9;
        }

       .chat-container {
            max-width: 1200px;
            margin: 50px auto;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            background-color: #fff;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

       .chat-header {
            padding: 20px;
            background-color: #4a5568;
            color: #fff;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            text-align: center;
        }

       .chat-messages {
            padding: 20px;
            height: 550px;
            overflow-y: auto;
        }

       .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 10px;
            max-width: 70%;
        }

       .user-message {
            background-color: #e2f4ff;
            margin-left: auto;
        }

       .ai-message {
            background-color: #f0f4f8;
        }

       .chat-input {
            display: flex;
            padding: 20px;
            border-top: 1px solid #e2e8f0;
        }

       .chat-input input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 5px;
            margin-right: 10px;
        }

       .chat-input button {
            padding: 10px 20px;
            background-color: #4a5568;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

       .chat-input button:hover {
            background-color: #2d3748;
        }
        .ai_thikn{
            font-size: 14px;
            background-color: #f2f2f2;
        }
    </style>
</head>
<script>
    var message_data = []; //存储聊天消息
    var ai_ui = 0;
 </script>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>AI Chat</h1>
        </div>
        <div class="chat-messages" id="chatMessages">
            <!-- 聊天消息将通过 JavaScript 动态添加 -->
        </div>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="说点什么吧...">
            <button id="sendButton"><i class="fas fa-paper-plane"></i>发送</button>
        </div>
    </div>

    <script src="chat.js"></script>


    <script>

        // const chatMessages = document.getElementById('chatMessages');
        // document.addEventListener('receiveReasoning', (event) => {
        //     const think = document.getElementById('think');

        // });

        // document.addEventListener('receiveAnswer', (event) => {
        //     console.log(chatMessages.innerHTML.length)
        // });

        document.getElementById('sendButton').addEventListener('click', () => {
            const inputText = document.getElementById('userInput').value;
            message_data.push({'role':'user','content':inputText});
            document.getElementById('userInput').value = '';
            chatMessages.innerHTML = chatMessages.innerHTML + '<div class="message user-message">'+ inputText+'</div>';
            connectWebSocket(message_data);
            chatMessages.innerHTML = chatMessages.innerHTML + '<div class="message ai_thikn" id="'+message_data.length+'s"></div>';
            chatMessages.innerHTML = chatMessages.innerHTML + '<div class="message " id="'+message_data.length+'"></div>';
        });

       
    </script>


</body>

</html>

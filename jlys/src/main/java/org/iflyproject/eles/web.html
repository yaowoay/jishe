<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.0.0/crypto-js.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        textarea {
            width: 100%;
            height: 100px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 20px;
        }
    </style>
</head>

<body>
<h1>CHAT</h1>
<textarea id="input_text" placeholder="请输入您的问题"></textarea>
<button id="ask_btn">立即提问</button>
<textarea id="output_text" readonly placeholder="回答将显示在这里"></textarea>
<script>

    const APPID = '96c077b7';
    const API_SECRET = 'NTY1NDg5MzZmYTE3MGU5YzBmMTZkYjMw';
    const API_KEY = '8cf73945dd152d12c504928d26cf529e';

    //流处理
    const httpUrl = new URL("wss://spark-api.xf-yun.com/v1/x1");
    let modelDomain;


    modelDomain = "x1";

    function getWebsocketUrl() {
        return new Promise((resolve, reject) => {
            const apiKey = API_KEY;
            const apiSecret = API_SECRET;
            let url = 'wss://' + httpUrl.host + httpUrl.pathname;
            const host = location.host;
            const date = new Date().toGMTString();
            const algorithm = 'hmac-sha256';
            const headers = 'host date request-line';
            const signatureOrigin = `host: ${host}\ndate: ${date}\nGET ${httpUrl.pathname} HTTP/1.1`;
            const CryptoJS = window.CryptoJS;
            const signatureSha = CryptoJS.HmacSHA256(signatureOrigin, apiSecret);
            const signature = CryptoJS.enc.Base64.stringify(signatureSha);
            const authorizationOrigin = `api_key="${apiKey}", algorithm="${algorithm}", headers="${headers}", signature="${signature}"`;
            const authorization = btoa(authorizationOrigin);
            url = `${url}?authorization=${authorization}&date=${date}&host=${host}`;
            resolve(url);
        });
    }

    function connectWebSocket() {
        const inputText = document.getElementById('input_text').value;
        const outputText = document.getElementById('output_text');
        getWebsocketUrl().then(url => {
            let ttsWS;
            if ('WebSocket' in window) {
                ttsWS = new WebSocket(url);
            } else if ('MozWebSocket' in window) {
                ttsWS = new MozWebSocket(url);
            } else {
                alert('浏览器不支持 WebSocket');
                return;
            }

            ttsWS.onopen = () => {
                const params = {
                    "header": {
                        "app_id": APPID,
                        "uid": "fd3f47e4-d"
                    },
                    "parameter": {
                        "chat": {
                            "domain": modelDomain,
                            "temperature": 0.5,
                            "max_tokens": 1024
                        }
                    },
                    "payload": {
                        "message": {
                            "text": [
                                {
                                    "role": "user",
                                    "content": inputText
                                }
                            ]
                        }
                    }
                };
                ttsWS.send(JSON.stringify(params));
            };

            ttsWS.onmessage = (e) => {

                const jsonData = JSON.parse(e.data);
                console.log(jsonData.payload.choices.text[0])
                if(jsonData.payload.choices.text[0].reasoning_content){

                }

                try {
                    const jsonData = JSON.parse(e.data);
                    if (jsonData.header.code !== 0) {
                        alert(`提问失败: ${jsonData.header.code}:${jsonData.header.message}`);
                        console.error(`${jsonData.header.code}:${jsonData.header.message}`);
                    } else {
                        const content = jsonData.payload.message.text[0].content;
                        outputText.value += content;
                        outputText.scrollTop = outputText.scrollHeight;
                    }
                    if (jsonData.header.status === 2) {
                        ttsWS.close();
                    }
                } catch (error) {
                    console.error('解析响应数据时出错:', error);
                }
            };

            ttsWS.onerror = (e) => {
                alert('WebSocket 报错，请 F12 查看详情');
                console.error(`详情查看：${encodeURI(url.replace('wss:', 'https:'))}`);
            };

            ttsWS.onclose = (e) => {
                console.log('WebSocket 连接已关闭');
            };
        });
    }

    document.getElementById('ask_btn').addEventListener('click', connectWebSocket);
</script>
</body>

</html>

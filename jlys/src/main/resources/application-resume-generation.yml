# 简历生成服务配置
# 使用方式：在主配置文件中添加 spring.profiles.include: resume-generation

# 讯飞AI配置
xunfei:
  ai:
    # 服务URL
    host-url: "https://cn-huadong-1.xf-yun.com/v1/private/s73f4add9"
    
    # 应用ID (请替换为您的实际APPID)
    app-id: "31381e2a"
    
    # API密钥 (请替换为您的实际API Key)
    api-key: "ed5be04955f940e8cf73ca8fa3969047"
    
    # API密钥 (请替换为您的实际API Secret)
    api-secret: "YTAyNmIzM2ZhYzkwZDYxYjI2YmZhYzMy"
    
    # 连接超时时间(秒)
    connect-timeout: 30
    
    # 读取超时时间(秒)
    read-timeout: 600
    
    # 连接池最大连接数
    max-connections: 100
    
    # 连接池保持时间(分钟)
    keep-alive-duration: 5

# 简历生成业务配置
resume:
  generation:
    # 默认模板类型
    default-template: "standard"
    
    # 默认风格
    default-style: "professional"
    
    # 最大提示词长度
    max-prompt-length: 5000
    
    # 生成超时时间(秒)
    generation-timeout: 120
    
    # 支持的输出格式
    supported-formats:
      - json
      - html
      - markdown
      - text
    
    # 模板配置
    templates:
      standard:
        name: "标准简历模板"
        description: "适用于大多数职位的通用简历模板"
      creative:
        name: "创意简历模板"
        description: "适用于设计、创意类职位的简历模板"
      technical:
        name: "技术简历模板"
        description: "适用于技术开发类职位的简历模板"
      executive:
        name: "高管简历模板"
        description: "适用于管理层、高管职位的简历模板"
      fresh_graduate:
        name: "应届生简历模板"
        description: "适用于应届毕业生的简历模板"
    
    # 风格配置
    styles:
      professional:
        name: "专业风格"
        description: "正式、专业的简历风格"
      modern:
        name: "现代风格"
        description: "时尚、现代的简历风格"
      classic:
        name: "经典风格"
        description: "传统、经典的简历风格"
      creative:
        name: "创意风格"
        description: "富有创意、个性化的简历风格"
      minimal:
        name: "简约风格"
        description: "简洁、清爽的简历风格"

# 日志配置
logging:
  level:
    com.aiinterview.service.impl.com.aiinterview.service.impl.resume.ResumeGenerationServiceImpl: DEBUG
    com.aiinterview.controller.com.aiinterview.controller.resume.ResumeGenerationController: DEBUG

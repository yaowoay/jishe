<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简历筛选和打分</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .form-container {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2d3748;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:disabled {
            background: #a0aec0;
            cursor: not-allowed;
            transform: none;
        }

        .result-section {
            margin-top: 30px;
            padding: 20px;
            background: #f7fafc;
            border-radius: 12px;
            border-left: 4px solid #667eea;
            display: none;
        }

        .result-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 15px;
        }

        .result-content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            white-space: pre-wrap;
            line-height: 1.6;
            max-height: 400px;
            overflow-y: auto;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #fed7d7;
            color: #c53030;
            padding: 15px 20px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
            border: 1px solid #feb2b2;
        }

        .success-message {
            background: #c6f6d5;
            color: #22543d;
            padding: 15px 20px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
            border: 1px solid #9ae6b4;
        }

        .info-box {
            background: #e6fffa;
            border: 1px solid #81e6d9;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .info-box h3 {
            color: #234e52;
            margin-bottom: 10px;
        }

        .info-box p {
            color: #2d3748;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 简历筛选和打分</h1>
            <p>AI 智能分析简历，提供详细的筛选结果和打分报告</p>
        </div>

        <div class="form-container">
            <div class="info-box">
                <h3>📋 使用说明</h3>
                <p>1. 输入已上传文件的 ID（从文件上传接口获取）<br>
                   2. 填写职位描述或筛选要求<br>
                   3. 输入具体的查询内容<br>
                   4. 点击分析按钮，等待 AI 生成详细的筛选报告</p>
            </div>

            <form id="resumeScoringForm">
                <div class="form-group">
                    <label for="uploadFileId">上传文件ID *</label>
                    <input type="text" id="uploadFileId" name="uploadFileId" required 
                           placeholder="例如: beddd1f9-c2a9-4dc9-b4c8-2617fe8d6aaa">
                </div>

                <div class="form-group">
                    <label for="jd">职位描述/筛选要求 *</label>
                    <textarea id="jd" name="jd" required 
                              placeholder="例如: Java后端开发工程师，要求3-5年经验，熟悉Spring框架..."></textarea>
                </div>

                <div class="form-group">
                    <label for="query">查询内容 *</label>
                    <input type="text" id="query" name="query" required 
                           placeholder="例如: 简历筛选并打分">
                </div>

                <div class="form-group">
                    <label for="user">用户标识</label>
                    <input type="text" id="user" name="user" value="user-123" 
                           placeholder="用户标识（可选）">
                </div>

                <div class="form-group">
                    <label for="conversationId">会话ID</label>
                    <input type="text" id="conversationId" name="conversationId" 
                           placeholder="会话ID（可选，用于继续之前的对话）">
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    🚀 开始分析简历
                </button>
            </form>

            <div class="loading" id="loading">
                <div class="loading-spinner"></div>
                <p>AI 正在分析简历，请稍候...</p>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <div class="result-section" id="resultSection">
                <div class="result-title">📊 分析结果</div>
                <div class="result-content" id="resultContent"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8080/api/resume-scoring';

        document.getElementById('resumeScoringForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const requestData = {
                uploadFileId: formData.get('uploadFileId'),
                jd: formData.get('jd'),
                query: formData.get('query'),
                user: formData.get('user') || 'user-123',
                conversationId: formData.get('conversationId') || ''
            };

            // 显示加载状态
            showLoading(true);
            hideMessages();

            try {
                const response = await fetch(`${API_BASE_URL}/analyze`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(requestData)
                });

                const result = await response.json();

                if (result.success) {
                    showSuccess('简历分析完成！');
                    displayResult(result.data);
                } else {
                    showError(result.message || '分析失败，请重试');
                }

            } catch (error) {
                console.error('请求失败:', error);
                showError('网络错误，请检查连接后重试');
            } finally {
                showLoading(false);
            }
        });

        function showLoading(show) {
            const loading = document.getElementById('loading');
            const submitBtn = document.getElementById('submitBtn');
            
            loading.style.display = show ? 'block' : 'none';
            submitBtn.disabled = show;
            submitBtn.textContent = show ? '分析中...' : '🚀 开始分析简历';
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
        }

        function hideMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
            document.getElementById('resultSection').style.display = 'none';
        }

        function displayResult(data) {
            const resultSection = document.getElementById('resultSection');
            const resultContent = document.getElementById('resultContent');
            
            let content = `消息ID: ${data.messageId}\n`;
            content += `会话ID: ${data.conversationId}\n`;
            content += `创建时间: ${new Date(data.createdAt * 1000).toLocaleString()}\n\n`;
            content += `分析结果:\n${data.answer}`;
            
            resultContent.textContent = content;
            resultSection.style.display = 'block';
        }

        // 页面加载时检查服务状态
        window.addEventListener('load', async function() {
            try {
                const response = await fetch(`${API_BASE_URL}/health`);
                const result = await response.json();
                console.log('服务状态:', result);
            } catch (error) {
                console.warn('无法连接到服务:', error);
            }
        });
    </script>
</body>
</html>

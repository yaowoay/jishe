<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师院校端 - 注册</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 500px;
        }
        .register-title {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .register-title h2 {
            font-weight: bold;
            margin-bottom: 10px;
        }
        .form-control {
            border-radius: 5px;
            border: 1px solid #ddd;
            padding: 10px 15px;
            margin-bottom: 15px;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-register {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 5px;
            padding: 10px;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }
        .btn-register:hover {
            background: linear-gradient(135deg, #5568d3 0%, #6a3f8f 100%);
            color: white;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        .login-link a {
            color: #667eea;
            text-decoration: none;
        }
        .error-message {
            color: #dc3545;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
        }
        .success-message {
            color: #28a745;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-title">
            <h2>教师注册</h2>
            <p>创建教师账号</p>
        </div>

        <div class="error-message" id="errorMsg"></div>
        <div class="success-message" id="successMsg"></div>

        <form id="registerForm" onsubmit="handleRegister(event)">
            <input type="email" class="form-control" id="email" placeholder="邮箱地址" required>
            <input type="password" class="form-control" id="password" placeholder="密码" required>
            <input type="text" class="form-control" id="teacherNo" placeholder="工号" required>
            <input type="text" class="form-control" id="realName" placeholder="真实姓名" required>
            <input type="tel" class="form-control" id="phone" placeholder="手机号" required>
            <select class="form-control" id="roleType" required>
                <option value="">选择角色</option>
                <option value="counselor">辅导员</option>
                <option value="advisor">学业导师</option>
                <option value="admin">管理员</option>
                <option value="leader">领导</option>
            </select>
            <select class="form-control" id="collegeId" required>
                <option value="">选择学院</option>
                <option value="1">计算机与信息工程学院</option>
                <option value="2">电子工程学院</option>
            </select>
            <button type="submit" class="btn btn-primary btn-register">注册</button>
        </form>

        <div class="login-link">
            已有账号？<a href="teacher-login.html">立即登录</a>
        </div>
    </div>

    <script>
        function handleRegister(event) {
            event.preventDefault();
            const data = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: 'teacher',
                teacherNo: document.getElementById('teacherNo').value,
                realName: document.getElementById('realName').value,
                phone: document.getElementById('phone').value,
                roleType: document.getElementById('roleType').value,
                collegeId: parseInt(document.getElementById('collegeId').value)
            };

            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');

            fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(r => r.json())
            .then(res => {
                if (res.success) {
                    successMsg.textContent = '注册成功，请登录';
                    successMsg.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'teacher-login.html';
                    }, 2000);
                } else {
                    errorMsg.textContent = res.message || '注册失败';
                    errorMsg.style.display = 'block';
                }
            })
            .catch(err => {
                errorMsg.textContent = '网络错误，请重试';
                errorMsg.style.display = 'block';
            });
        }
    </script>
</body>
</html>

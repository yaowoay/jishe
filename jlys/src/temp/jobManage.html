<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高校学生就业能力智配平台 - 职位管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/boxicons@2.0.7/css/boxicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind 配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#36CFC9',
                        success: '#00B42A',
                        warning: '#FF7D00',
                        danger: '#F53F3F',
                        info: '#86909C',
                        light: '#F2F3F5',
                        dark: '#1D2129',
                        'primary-light': '#E8F3FF',
                    },
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                    },
                    boxShadow: {
                        'card': '0 4px 20px rgba(0, 0, 0, 0.08)',
                        'hover': '0 8px 30px rgba(0, 0, 0, 0.12)',
                    }
                },
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .card-shadow {
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
                transition: all 0.3s ease;
            }
            .card-shadow:hover {
                box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
                transform: translateY(-2px);
            }
            .high-score {
                background-color: rgba(0, 180, 42, 0.05);
            }
            .status-active {
                background-color: #E8FFF3;
                color: #00B42A;
            }
            .status-inactive {
                background-color: #FFECE8;
                color: #F53F3F;
            }
        }
    </style>
</head>
<body class="font-inter bg-gray-50 text-dark min-h-screen">
    <!-- 顶部导航栏 -->
    <header class="fixed top-0 left-0 right-0 bg-white shadow-sm z-50">
        <div class="container mx-auto px-4 flex items-center justify-between h-16">
            <div class="flex items-center space-x-1">
                <div class="text-primary font-bold text-xl flex items-center">
                    <i class='bx bx-bot mr-2'></i>
                    <span>高校学生就业能力智配平台 - 企业版</span>
                </div>

                <nav class="hidden md:flex ml-8 space-x-6">
                    <a href="/company/dashboard" class="text-gray-600 hover:text-primary px-1 py-5 font-medium transition-colors">
                        <i class='bx bxs-dashboard mr-1'></i>控制台
                    </a>
                    <a href="/company/jobManage" class="text-primary border-b-2 border-primary px-1 py-5 font-medium">
                        <i class='bx bx-briefcase mr-1'></i>职位管理
                    </a>
                    <a href="/company/interview" class="text-gray-600 hover:text-primary px-1 py-5 font-medium transition-colors">
                        <i class='bx bx-user mr-1'></i>候选人
                    </a>
                    <a href="/company/companyCenter" class="text-gray-600 hover:text-primary px-1 py-5 font-medium transition-colors">
                        <i class='bx bx-cog mr-1'></i>企业设置
                    </a>
                </nav>
            </div>

            <!-- 右侧用户区域 -->
            <div class="flex items-center space-x-4">
                <button class="md:hidden text-gray-600 focus:outline-none">
                    <i class='bx bx-menu text-xl'></i>
                </button>
                <div class="relative">
                    <button class="flex items-center space-x-2 focus:outline-none" id="userMenuBtn">
                        <img src="{{ url_for('static', filename='applicant_logo/公司头像.png') }}" alt="企业Logo" class="w-8 h-8 rounded-full object-cover border-2 border-primary-light">
                        <span class="hidden md:inline-block font-medium">{{ company_name }}</span>
                        <i class="fa fa-angle-down text-xs text-gray-500"></i>
                    </button>
                    <div class="absolute right-0 mt-2 w-48 rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5 opacity-0 invisible transition-all duration-200 transform origin-top-right scale-95" id="userMenu">
                        <div class="py-1">
                            <a href="/company/companyCenter" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                                <i class='bx bx-cog mr-2'></i>企业设置
                            </a>
                            <div class="border-t border-gray-100 my-1"></div>
                            <a href="/logout" class="block px-4 py-2 text-sm text-red-600 hover:bg-gray-100">
                                <i class='bx bx-log-out mr-2'></i>退出登录
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- 主要内容区域 -->
    <main class="container mx-auto px-4 pt-24 pb-12">
        <!-- 页面标题和操作区 -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8">
            <div>
                <h1 class="text-[clamp(1.5rem,3vw,2.5rem)] font-bold text-gray-800">职位管理</h1>
                <p class="text-gray-500 mt-1">管理您的招聘职位</p>
            </div>
            <button class="mt-4 md:mt-0 px-4 py-2 bg-primary text-white rounded-md hover:bg-primary/90 transition-colors flex items-center" onclick="openAddJobModal()">
                <i class='bx bx-plus mr-2'></i>发布新职位
            </button>
        </div>

        <!-- 搜索和筛选 -->
        <div class="bg-white rounded-xl p-4 mb-6 card-shadow">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-1 relative">
                    <i class='bx bx-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400'></i>
                    <input type="text" id="searchInput" placeholder="搜索职位名称、类型或地点..."
                           class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:border-primary">
                </div>
                <select class="px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:border-primary">
                    <option value="">所有类型</option>
                    <option value="全职">全职</option>
                    <option value="兼职">兼职</option>
                    <option value="实习">实习</option>
                </select>
                <select class="px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:border-primary">
                    <option value="">所有状态</option>
                    <option value="active">活跃</option>
                    <option value="inactive">已结束</option>
                </select>
            </div>
        </div>

        <!-- 职位列表 -->
        <div class="bg-white rounded-xl card-shadow overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full" id="jobTable">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">职位名称</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">类型</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">薪资范围</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">工作地点</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                        </tr>
                    </thead>
                    <tbody id="jobTableBody" class="divide-y divide-gray-200">
                        <!-- 职位列表将通过AJAX动态加载 -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- 发布新职位模态框 -->
    <div class="modal fixed inset-0 bg-black bg-opacity-50 items-center justify-center z-50 hidden" id="addJobModal">
        <div class="bg-white rounded-xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b">
                <div class="flex justify-between items-center">
                    <h3 class="text-xl font-semibold">发布新职位</h3>
                    <button onclick="closeAddJobModal()" class="text-gray-500 hover:text-gray-700">
                        <i class='bx bx-x text-2xl'></i>
                    </button>
                </div>
            </div>

            <form id="jobForm" class="p-6 space-y-6">
                <input type="hidden" id="jobId" name="jobId" value="">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="jobTitle" class="block text-sm font-medium text-gray-700 mb-2">职位名称</label>
                        <div class="relative">
                            <i class='bx bx-briefcase absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400'></i>
                            <input type="text" id="jobTitle" name="jobTitle" required
                                   class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-primary">
                        </div>
                    </div>

                    <div>
                        <label for="jobType" class="block text-sm font-medium text-gray-700 mb-2">职位类型</label>
                        <select id="jobType" name="jobType" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-primary">
                            <option value="">请选择类型</option>
                            <option value="全职">全职</option>
                            <option value="兼职">兼职</option>
                            <option value="实习">实习</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label for="jobDescription" class="block text-sm font-medium text-gray-700 mb-2">职位描述</label>
                    <textarea id="jobDescription" name="jobDescription" rows="3" required
                              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-primary"
                              placeholder="请详细描述该职位的工作内容和职责..."></textarea>
                </div>

                <div>
                    <label for="jobRequirements" class="block text-sm font-medium text-gray-700 mb-2">职位要求</label>
                    <textarea id="jobRequirements" name="jobRequirements" rows="3" required
                              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-primary"
                              placeholder="请列出该职位的具体要求，如技能、经验等..."></textarea>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="minSalary" class="block text-sm font-medium text-gray-700 mb-2">最低薪资</label>
                        <div class="relative">
                            <i class='bx bx-money absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400'></i>
                            <input type="number" id="minSalary" name="minSalary" step="500" required
                                   class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-primary"
                                   placeholder="如: 8000">
                        </div>
                    </div>

                    <div>
                        <label for="maxSalary" class="block text-sm font-medium text-gray-700 mb-2">最高薪资</label>
                        <div class="relative">
                            <i class='bx bx-money absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400'></i>
                            <input type="number" id="maxSalary" name="maxSalary" step="500" required
                                   class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-primary"
                                   placeholder="如: 15000">
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="province" class="block text-sm font-medium text-gray-700 mb-2">省份</label>
                        <select id="province" name="province" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-primary">
                            <option value="">请选择省份</option>
                        </select>
                    </div>

                    <div>
                        <label for="city" class="block text-sm font-medium text-gray-700 mb-2">城市</label>
                        <select id="city" name="city" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-primary">
                            <option value="">请选择城市</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label for="expirationDate" class="block text-sm font-medium text-gray-700 mb-2">截止日期</label>
                    <div class="relative">
                        <i class='bx bx-calendar absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400'></i>
                        <input type="date" id="expirationDate" name="expirationDate"
                               class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-primary">
                    </div>
                </div>

                <div class="flex justify-end space-x-4 pt-4">
                    <button type="button" onclick="closeAddJobModal()"
                            class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
                        取消
                    </button>
                    <button type="submit"
                            class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors">
                        发布职位
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/city.js"></script>

    <script>
        // 用户菜单交互
        document.getElementById('userMenuBtn').addEventListener('click', function() {
            const menu = document.getElementById('userMenu');
            menu.classList.toggle('opacity-0');
            menu.classList.toggle('invisible');
            menu.classList.toggle('scale-95');
            menu.classList.toggle('scale-100');
        });

        // 模态框控制
        function openAddJobModal() {
            document.getElementById('addJobModal').classList.remove('hidden');
            document.getElementById('addJobModal').classList.add('flex');
            document.body.classList.add('overflow-hidden');
        }

        function closeAddJobModal() {
            document.getElementById('addJobModal').classList.add('hidden');
            document.getElementById('addJobModal').classList.remove('flex');
            document.body.classList.remove('overflow-hidden');
        }

        // 获取职位列表
        document.addEventListener('DOMContentLoaded', function() {
            fetch('/api/get_jobs')
                .then(response => response.json())
                .then(data => {
                    const jobTableBody = document.getElementById('jobTableBody');
                    jobTableBody.innerHTML = '';

                    if (data.jobs.length === 0) {
                        const emptyRow = document.createElement('tr');
                        emptyRow.innerHTML = '<td colspan="6" class="text-center py-8 text-gray-500">暂无职位数据</td>';
                        jobTableBody.appendChild(emptyRow);
                    } else {
                        data.jobs.sort((a, b) => b.total_score - a.total_score).forEach(job => {
                            const row = document.createElement('tr');
                            row.className = job.total_score >= 8 ? 'high-score' : '';
                            row.innerHTML = `
                                <td class="px-6 py-4">
                                    <div class="font-medium">${job.title}</div>
                                </td>
                                <td class="px-6 py-4">
                                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-primary-light text-primary">
                                        ${job.job_type}
                                    </span>
                                </td>
                                <td class="px-6 py-4">
                                    <div class="text-sm text-gray-900">
                                        ¥${job.min_salary} - ¥${job.max_salary}
                                    </div>
                                </td>
                                <td class="px-6 py-4">
                                    <div class="text-sm text-gray-900">${job.location}</div>
                                </td>
                                <td class="px-6 py-4">
                                    <span class="status ${job.status === 'active' ? 'status-active' : 'status-inactive'}">
                                        ${job.status === 'active' ? '活跃' : '已结束'}
                                    </span>
                                </td>
                                <td class="px-6 py-4">
                                    <div class="flex space-x-2">
                                        <a href="/api/job_detail/${job.job_id}"
                                           class="text-primary hover:text-primary/80 transition-colors text-sm">
                                            查看详情
                                        </a>
                                        <button onclick="toggleJobStatus(${job.job_id}, '${job.status}')"
                                                class="text-${job.status === 'active' ? 'danger' : 'success'} hover:text-${job.status === 'active' ? 'danger' : 'success'}/80 transition-colors text-sm">
                                            ${job.status === 'active' ? '关闭' : '重新发布'}
                                        </button>
                                    </div>
                                </td>
                            `;
                            jobTableBody.appendChild(row);
                        });
                    }
                });

            // 发布新职位
            document.getElementById('jobForm').addEventListener('submit', function(event) {
                event.preventDefault();
                const formData = new FormData(this);
                const key1 = formData.get('province');
                const key2 = formData.get('city');
                const locations = citys[0][key1] + citys[key1][key2];

                const jobData = {
                    job_id: formData.get('jobId'),
                    title: formData.get('jobTitle'),
                    job_type: formData.get('jobType'),
                    description: formData.get('jobDescription'),
                    requirements: formData.get('jobRequirements'),
                    min_salary: formData.get('minSalary'),
                    max_salary: formData.get('maxSalary'),
                    location: locations,
                    post_date: new Date().toISOString().split('T')[0],
                    expiration_date: formData.get('expirationDate') || null
                };

                fetch('/api/upload_job', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(jobData)
                })
                .then(response => response.json())
                .then(data => {
                    if (data.message === '职位发布成功') {
                        alert('职位发布成功');
                        closeAddJobModal();
                        window.location.reload();
                    } else {
                        alert('职位发布失败: ' + data.message);
                    }
                });
            });

            // 搜索功能
            document.getElementById('searchInput').addEventListener('input', function() {
                const filter = this.value.toLowerCase();
                const rows = document.querySelectorAll('#jobTableBody tr');
                rows.forEach(row => {
                    const text = row.textContent.toLowerCase();
                    row.style.display = text.includes(filter) ? '' : 'none';
                });
            });

            // 省份城市选择器
            const provinceSelect = document.getElementById("province");
            const citySelect = document.getElementById("city");

            // 加载省份
            for (let key in citys[0]) {
                let option = document.createElement("option");
                option.value = key;
                option.textContent = citys[0][key];
                provinceSelect.appendChild(option);
            }

            // 监听省份选择，更新城市
            provinceSelect.addEventListener("change", function() {
                const provinceId = this.value;
                citySelect.innerHTML = `<option value="">请选择城市</option>`;

                if (provinceId && citys[provinceId]) {
                    for (let key in citys[provinceId]) {
                        let option = document.createElement("option");
                        option.value = key;
                        option.textContent = citys[provinceId][key];
                        citySelect.appendChild(option);
                    }
                }
            });

            // 点击模态框外部关闭
            document.getElementById('addJobModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeAddJobModal();
                }
            });
        });

        // 切换职位状态
        function toggleJobStatus(jobId, currentStatus) {
            const action = currentStatus === 'active' ? '关闭' : '重新发布';
            if (confirm(`确定要${action}该职位吗？`)) {
                fetch('/api/toggle_job_status', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ job_id: jobId })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert(`${action}成功`);
                        window.location.reload();
                    } else {
                        alert(`${action}失败: ${data.message}`);
                    }
                });
            }
        }
    </script>
</body>
</html>

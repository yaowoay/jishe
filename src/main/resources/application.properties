
server.port=8088
# THYMELEAF (ThymeleafAutoConfiguration)

spring.thymeleaf.cache=true

spring.thymeleaf.check-template=true

spring.thymeleaf.check-template-location=true
#Content-Type
spring.thymeleaf.content-type=text/html
#MVC Thymeleaf true
spring.thymeleaf.enabled=true

spring.thymeleaf.encoding=UTF-8

spring.thymeleaf.excluded-view-names=
# StandardTemplate-ModeHandlers
spring.thymeleaf.mode=HTML5
#  URLclasspath:/templates/
spring.thymeleaf.prefix=classpath:/templates/
# URL
spring.thymeleaf.suffix=.html
# 文件上传  #单个和总上传的数据大小
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

file.upload-dir=F:/data/
#Windows本地存储根路径（需提前创建目录）

# 数据库
spring.datasource.url=jdbc:mysql://localhost:3306/interview_system
spring.datasource.username=root
spring.datasource.password=QAQ.1117
spring.jpa.hibernate.ddl-auto=update
#JPA配置
spring.jpa.open-in-view=false
# spring-security
spring.security.user.password=QAQ.1117
management.endpoints.web.exposure.include=health,info

#显示完整的错误堆栈
server.error.include-stacktrace=always
server.error.include-message=always



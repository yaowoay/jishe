# 代码沙箱相关
codeSandbox:
  type: remote
# 存储配置（原OSS改为本地）
# 本地存储配置
local:
  storage:
    base-path: E:/java_code/rjb_oj/easyojandlogin/src/main/resources/txt  # Windows本地存储根路径（需提前创建目录）
    access-prefix: /api/file/download/  # 访问前缀（与FileConstant中的COS_HOST对应）
file:
  upload-dir: E:/java_code/rjb_oj/easyojandlogin/src/main/resources
# 添加缓存配置
answer:
  storage:
    path: E:/java_code/rjb_oj/easyojandlogin/src/main/resources/answer
  cache:
    expiration-minutes: 120 # 测试环境延长至2小时


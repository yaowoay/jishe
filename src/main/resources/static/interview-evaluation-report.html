<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面试评估报告</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --success-color: #67c23a;
            --warning-color: #e6a23c;
            --danger-color: #f56c6c;
            --info-color: #409eff;
            --text-primary: #303133;
            --text-secondary: #606266;
            --text-placeholder: #c0c4cc;
            --border-color: #dcdfe6;
            --bg-color: #f5f7fa;
            --white: #ffffff;
            --shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
            --shadow-light: 0 2px 4px rgba(0, 0, 0, 0.12), 0 0 6px rgba(0, 0, 0, 0.04);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, #e3f2fd 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: var(--shadow);
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .report-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--white);
            border-radius: 16px;
            padding: 30px;
            box-shadow: var(--shadow-light);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow);
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .score-display {
            text-align: center;
            margin-bottom: 30px;
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: conic-gradient(var(--success-color) 0deg, var(--success-color) calc(var(--score) * 3.6deg), #e5e5e5 calc(var(--score) * 3.6deg));
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            position: relative;
        }

        .score-circle::before {
            content: '';
            width: 90px;
            height: 90px;
            background: white;
            border-radius: 50%;
            position: absolute;
        }

        .score-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--success-color);
            z-index: 1;
        }

        .score-label {
            font-size: 1rem;
            color: var(--text-secondary);
        }

        .rating-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .rating-excellent {
            background: #f0f9ff;
            color: var(--success-color);
            border: 2px solid var(--success-color);
        }

        .rating-good {
            background: #f0f9ff;
            color: var(--info-color);
            border: 2px solid var(--info-color);
        }

        .rating-fair {
            background: #fffbf0;
            color: var(--warning-color);
            border: 2px solid var(--warning-color);
        }

        .rating-poor {
            background: #fef0f0;
            color: var(--danger-color);
            border: 2px solid var(--danger-color);
        }

        .skill-radar {
            height: 300px;
            margin: 20px 0;
        }

        .performance-list {
            list-style: none;
        }

        .performance-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid var(--primary-color);
        }

        .performance-header {
            display: flex;
            justify-content: between;
            align-items: center;
            margin-bottom: 10px;
        }

        .round-number {
            background: var(--primary-color);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .round-score {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .question-text {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .answer-text {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 8px;
        }

        .feedback-text {
            color: var(--info-color);
            font-size: 0.9rem;
            font-style: italic;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .recommendations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .resource-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease;
        }

        .resource-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-light);
        }

        .resource-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .resource-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .resource-title {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 1.1rem;
        }

        .resource-meta {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .resource-description {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 15px;
        }

        .resource-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .tag {
            background: var(--primary-color);
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
        }

        .resource-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .resource-link:hover {
            text-decoration: underline;
        }

        .summary-report {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 16px;
            padding: 30px;
            margin-top: 30px;
            border-left: 5px solid var(--primary-color);
        }

        .summary-report h3 {
            color: var(--primary-color);
            margin-bottom: 20px;
            font-size: 1.3rem;
        }

        .summary-content {
            white-space: pre-line;
            line-height: 1.8;
            color: var(--text-primary);
        }

        @media (max-width: 768px) {
            .report-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .recommendations-grid {
                grid-template-columns: 1fr;
            }
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-chart-line"></i> 面试评估报告</h1>
            <div class="subtitle">基于AI分析的个性化面试表现评估与学习建议</div>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>正在生成您的面试评估报告...</p>
        </div>

        <div id="reportContent" style="display: none;">
            <!-- 报告内容将通过JavaScript动态生成 -->
        </div>
    </div>

    <script>
        // 模拟数据 - 实际使用时从API获取
        const mockData = {
            sessionId: "session_123456",
            finalScore: 7.5,
            totalRounds: 3,
            durationMinutes: 45,
            startTime: "2025-08-10T10:00:00",
            endTime: "2025-08-10T10:45:00",
            jobPosition: "Java后端开发工程师",
            style: "professional",
            strengths: ["Java基础", "Spring框架", "数据库设计"],
            improvements: ["微服务架构", "分布式系统", "性能优化"],
            overallRating: "good",
            skillAssessments: {
                "Java基础": {
                    skillName: "Java基础",
                    currentLevel: 8.0,
                    targetLevel: 9.0,
                    gapAnalysis: "表现优秀，继续保持",
                    improvementSuggestion: "深入学习高级特性，分享经验给团队"
                },
                "微服务架构": {
                    skillName: "微服务架构",
                    currentLevel: 5.0,
                    targetLevel: 8.0,
                    gapAnalysis: "需要加强学习和实践",
                    improvementSuggestion: "建议通过系统学习和项目实践来提升"
                }
            },
            roundPerformances: [
                {
                    round: 1,
                    question: "请介绍一下Java中的多态性，并举例说明。",
                    answer: "多态性是面向对象编程的重要特性，允许同一个接口调用不同的实现...",
                    score: 8.5,
                    feedback: "回答优秀，展现了深度理解",
                    questionType: "技术问题",
                    answerDuration: 120
                },
                {
                    round: 2,
                    question: "描述一下你在项目中如何处理高并发场景？",
                    answer: "在高并发场景下，我主要采用了缓存、数据库优化等方案...",
                    score: 7.0,
                    feedback: "回答良好，有一定深度",
                    questionType: "项目问题",
                    answerDuration: 150
                },
                {
                    round: 3,
                    question: "如果让你设计一个微服务架构，你会考虑哪些因素？",
                    answer: "微服务架构设计需要考虑服务拆分、通信方式、数据一致性...",
                    score: 6.5,
                    feedback: "回答基本正确，可以更深入",
                    questionType: "架构问题",
                    answerDuration: 180
                }
            ],
            recommendations: [
                {
                    title: "Spring Cloud微服务实战",
                    type: "course",
                    url: "https://example.com/course1",
                    description: "深入学习Spring Cloud生态，掌握微服务架构设计与实现",
                    difficulty: "intermediate",
                    tags: ["Spring Cloud", "微服务", "分布式"],
                    estimatedHours: 40,
                    relevanceScore: 95.0,
                    provider: "慕课网",
                    isFree: false,
                    price: "¥299",
                    icon: "fas fa-graduation-cap",
                    reason: "针对微服务架构薄弱环节的系统性学习"
                },
                {
                    title: "Redis性能优化实战指南",
                    type: "document",
                    url: "https://example.com/doc1",
                    description: "Redis缓存优化策略与最佳实践",
                    difficulty: "advanced",
                    tags: ["Redis", "缓存", "性能优化"],
                    estimatedHours: 15,
                    relevanceScore: 88.0,
                    provider: "技术博客",
                    isFree: true,
                    price: "免费",
                    icon: "fas fa-file-alt",
                    reason: "提升缓存技术和性能优化能力"
                },
                {
                    title: "分布式系统设计模式",
                    type: "book",
                    url: "https://example.com/book1",
                    description: "分布式系统的经典设计模式与案例分析",
                    difficulty: "advanced",
                    tags: ["分布式", "系统设计", "架构模式"],
                    estimatedHours: 60,
                    relevanceScore: 92.0,
                    provider: "机械工业出版社",
                    isFree: false,
                    price: "¥89",
                    icon: "fas fa-book",
                    reason: "系统性学习分布式系统设计理念"
                }
            ],
            summaryReport: `## 面试评估报告

**职位**: Java后端开发工程师
**总体得分**: 7.5/10
**评价等级**: good
**面试轮次**: 3轮

### 优势领域
- Java基础
- Spring框架
- 数据库设计

### 待提升领域
- 微服务架构
- 分布式系统
- 性能优化

### 学习建议
根据您的面试表现，我们为您推荐了 3 个学习资源，重点关注薄弱环节的提升。`
        };

        // 页面加载完成后渲染报告
        document.addEventListener('DOMContentLoaded', function() {
            // 从URL参数获取sessionId
            const urlParams = new URLSearchParams(window.location.search);
            const sessionId = urlParams.get('sessionId');

            if (sessionId) {
                // 调用真实API获取面试报告
                loadInterviewReport(sessionId);
            } else {
                // 如果没有sessionId，使用模拟数据进行演示
                setTimeout(() => {
                    renderReport(mockData);
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('reportContent').style.display = 'block';
                }, 2000);
            }
        });

        function renderReport(data) {
            const reportContent = document.getElementById('reportContent');
            
            reportContent.innerHTML = `
                <div class="report-grid">
                    <!-- 总体评分卡片 -->
                    <div class="card">
                        <div class="card-title">
                            <i class="fas fa-trophy"></i>
                            总体表现
                        </div>
                        <div class="score-display">
                            <div class="score-circle" style="--score: ${data.finalScore * 10}">
                                <div class="score-value">${data.finalScore.toFixed(1)}</div>
                            </div>
                            <div class="score-label">综合得分</div>
                            <div class="rating-badge rating-${data.overallRating}">
                                ${getRatingText(data.overallRating)}
                            </div>
                        </div>
                        <div style="text-align: center; color: var(--text-secondary);">
                            <p><strong>职位:</strong> ${data.jobPosition}</p>
                            <p><strong>面试轮次:</strong> ${data.totalRounds}轮</p>
                            <p><strong>用时:</strong> ${data.durationMinutes}分钟</p>
                        </div>
                    </div>

                    <!-- 技能雷达图 -->
                    <div class="card">
                        <div class="card-title">
                            <i class="fas fa-chart-radar"></i>
                            技能评估
                        </div>
                        <div class="skill-radar">
                            <canvas id="skillRadarChart"></canvas>
                        </div>
                    </div>

                    <!-- 各轮表现 -->
                    <div class="card full-width">
                        <div class="card-title">
                            <i class="fas fa-list-ol"></i>
                            各轮表现详情
                        </div>
                        <ul class="performance-list">
                            ${data.roundPerformances.map(round => `
                                <li class="performance-item">
                                    <div class="performance-header">
                                        <div class="round-number">${round.round}</div>
                                        <div class="round-score" style="color: ${getScoreColor(round.score)}">${round.score.toFixed(1)}分</div>
                                    </div>
                                    <div class="question-text">问题: ${round.question}</div>
                                    <div class="answer-text">回答: ${round.answer.substring(0, 100)}...</div>
                                    <div class="feedback-text">评价: ${round.feedback}</div>
                                </li>
                            `).join('')}
                        </ul>
                    </div>

                    <!-- 学习资源推荐 -->
                    <div class="card full-width">
                        <div class="card-title">
                            <i class="fas fa-lightbulb"></i>
                            个性化学习推荐
                        </div>
                        <div class="recommendations-grid">
                            ${data.recommendations.map(resource => `
                                <div class="resource-card">
                                    <div class="resource-header">
                                        <div class="resource-icon">
                                            <i class="${resource.icon}"></i>
                                        </div>
                                        <div class="resource-title">${resource.title}</div>
                                    </div>
                                    <div class="resource-meta">
                                        <span><i class="fas fa-signal"></i> ${resource.difficulty}</span>
                                        <span><i class="fas fa-clock"></i> ${resource.estimatedHours}小时</span>
                                        <span><i class="fas fa-star"></i> ${resource.relevanceScore}%匹配</span>
                                    </div>
                                    <div class="resource-description">${resource.description}</div>
                                    <div class="resource-tags">
                                        ${resource.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                                    </div>
                                    <a href="${resource.url}" class="resource-link" target="_blank">
                                        <i class="fas fa-external-link-alt"></i>
                                        开始学习 (${resource.price})
                                    </a>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>

                <!-- 总结报告 -->
                <div class="summary-report">
                    <h3><i class="fas fa-file-alt"></i> 详细分析报告</h3>
                    <div class="summary-content">${data.summaryReport}</div>
                </div>
            `;

            // 渲染技能雷达图
            renderSkillRadar(data);
        }

        function renderSkillRadar(data) {
            const ctx = document.getElementById('skillRadarChart').getContext('2d');
            
            const skills = Object.keys(data.skillAssessments);
            const currentLevels = skills.map(skill => data.skillAssessments[skill].currentLevel);
            const targetLevels = skills.map(skill => data.skillAssessments[skill].targetLevel);

            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: skills,
                    datasets: [{
                        label: '当前水平',
                        data: currentLevels,
                        borderColor: 'rgb(102, 126, 234)',
                        backgroundColor: 'rgba(102, 126, 234, 0.2)',
                        pointBackgroundColor: 'rgb(102, 126, 234)',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: 'rgb(102, 126, 234)'
                    }, {
                        label: '目标水平',
                        data: targetLevels,
                        borderColor: 'rgb(103, 194, 58)',
                        backgroundColor: 'rgba(103, 194, 58, 0.2)',
                        pointBackgroundColor: 'rgb(103, 194, 58)',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: 'rgb(103, 194, 58)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            beginAtZero: true,
                            max: 10,
                            ticks: {
                                stepSize: 2
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        }

        function getRatingText(rating) {
            const ratingMap = {
                'excellent': '优秀',
                'good': '良好',
                'fair': '一般',
                'poor': '待提升'
            };
            return ratingMap[rating] || '未知';
        }

        function getScoreColor(score) {
            if (score >= 8) return 'var(--success-color)';
            if (score >= 6) return 'var(--info-color)';
            if (score >= 4) return 'var(--warning-color)';
            return 'var(--danger-color)';
        }

        // 实际使用时的API调用函数
        function loadInterviewReport(sessionId) {
            document.getElementById('loading').querySelector('p').textContent = `正在分析面试会话 ${sessionId} 的结果...`;

            fetch(`/api/interview/question/complete/${sessionId}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.code === 0) {
                    renderReport(data.data);
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('reportContent').style.display = 'block';
                } else {
                    console.error('获取面试报告失败:', data.message);
                    showError('获取面试报告失败: ' + data.message);
                }
            })
            .catch(error => {
                console.error('API调用失败:', error);
                showError('网络请求失败，请检查网络连接或稍后重试');
            });
        }

        // 显示错误信息
        function showError(message) {
            document.getElementById('loading').innerHTML = `
                <div style="color: var(--danger-color); text-align: center;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 3rem; margin-bottom: 20px;"></i>
                    <h3>加载失败</h3>
                    <p>${message}</p>
                    <button onclick="location.reload()" style="
                        background: var(--primary-color);
                        color: white;
                        border: none;
                        padding: 10px 20px;
                        border-radius: 8px;
                        cursor: pointer;
                        margin-top: 20px;
                    ">重新加载</button>
                </div>
            `;
        }

        // 从URL参数获取sessionId（实际使用时）
        // const urlParams = new URLSearchParams(window.location.search);
        // const sessionId = urlParams.get('sessionId');
        // if (sessionId) {
        //     loadInterviewReport(sessionId);
        // }
    </script>
</body>
</html>
